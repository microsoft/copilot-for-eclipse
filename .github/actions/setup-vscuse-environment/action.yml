name: 'Setup Vsc Use Environment'
description: 'Sets up Node.js, Python, Appium, and WinAppDriver on Windows, and download the vscuse.exe'

inputs:
  version:
    description: 'Version of vscuse to download, e.g. v0.1.15 (default: latest)'
    required: false
    default: 'latest'
  store-path:
    description: 'Path to store the downloaded vscuse.exe'
    required: true
    default: 'tests/vscuse'

runs:
  using: "composite"
  steps:
      # Setup the environment
    - name: Set Windows Environment Variables
      run: |
        [System.Environment]::SetEnvironmentVariable("MODEL_NAME", "${{ env.MODEL_NAME }}", [System.EnvironmentVariableTarget]::Machine)
        [System.Environment]::SetEnvironmentVariable("AZURE_OPENAI_KEY", "${{ env.AZURE_OPENAI_KEY }}", [System.EnvironmentVariableTarget]::Machine)
        [System.Environment]::SetEnvironmentVariable("AZURE_OPENAI_ENDPOINT", "${{ env.AZURE_OPENAI_ENDPOINT }}", [System.EnvironmentVariableTarget]::Machine)
        [System.Environment]::SetEnvironmentVariable("AZURE_VISION_ENDPOINT", "${{ env.AZURE_VISION_ENDPOINT }}", [System.EnvironmentVariableTarget]::Machine)
        [System.Environment]::SetEnvironmentVariable("AZURE_VISION_KEY", "${{ env.AZURE_VISION_KEY }}", [System.EnvironmentVariableTarget]::Machine)
        [System.Environment]::SetEnvironmentVariable("AZURE_COSMOS_ENDPOINT", "${{ env.AZURE_COSMOS_ENDPOINT }}", [System.EnvironmentVariableTarget]::Machine)
        [System.Environment]::SetEnvironmentVariable("AZURE_COSMOS_DATABASE", "${{ env.AZURE_COSMOS_DATABASE }}", [System.EnvironmentVariableTarget]::Machine)
        [System.Environment]::SetEnvironmentVariable("AZURE_COSMOS_CONTAINER", "${{ env.AZURE_COSMOS_CONTAINER }}", [System.EnvironmentVariableTarget]::Machine)
        [System.Environment]::SetEnvironmentVariable("AZURE_COSMOS_KEY", "${{ env.AZURE_COSMOS_KEY }}", [System.EnvironmentVariableTarget]::Machine)
      shell: pwsh

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 22

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Appium
      shell: bash
      run: |
        npm install -g appium
        appium driver install windows
        appium -v

    - name: Install WinAppDriver
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri https://github.com/microsoft/WinAppDriver/releases/download/v1.2.1/WindowsApplicationDriver_1.2.1.msi -OutFile WinAppDriver.msi
        Start-Process msiexec.exe -ArgumentList '/i WinAppDriver.msi /quiet /norestart' -NoNewWindow -Wait

    - name: Enable Developer Mode (Requires Admin Privileges)
      shell: cmd
      run: |
        reg add "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /t REG_DWORD /f /v "AllowDevelopmentWithoutDevLicense" /d 1

    - name: Start Appium in Background
      shell: pwsh
      run: Start-Process -NoNewWindow -FilePath "cmd.exe" -ArgumentList "/c start /b appium --use-drivers=windows"

    - name: Wait for Appium to Start
      shell: pwsh
      run: Start-Sleep -Seconds 15

    - name: Verify Appium Server is Running
      shell: powershell
      run: |
        curl http://127.0.0.1:4723/status

    - name: Install dependencies for download actions
      run: npm install @octokit/auth-app @octokit/request @octokit/core node-fetch 
      shell: bash

    - name: Run download script
      run: node download-vscuse.js "${{ inputs.version }}" "${{ inputs.store-path }}"
      shell: bash
      working-directory: .github/actions/setup-vscuse-environment

    - name: Run vscuse.exe
      working-directory: ${{ inputs.store-path }}
      run: |
        vscuse.exe version
      shell: cmd
