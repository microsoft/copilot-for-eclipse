name: Sync Pull Request to microsoft/copilot-eclipse

on:
    workflow_dispatch:
        inputs:
            pr_number:
                description: 'Pull Request Number'
                required: true
                type: string
    pull_request:
        types: [opened, synchronize]
        branches:
            - main

jobs:
    sync-pr:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
        env:
            TARGET_REPO: microsoft/copilot-eclipse
            TARGET_BRANCH: main
            PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}

        steps:
            - name: Debug event info
              run: |
                  echo "Event name: ${{ github.event_name }}"
                  echo "PR number: ${{ env.PR_NUMBER }}"
                  echo "PR branch: ${{ github.event.pull_request.head.ref }}"
                  echo "PR base: ${{ github.event.pull_request.base.ref }}"

            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                  ref: ${{ github.event.pull_request.head.ref }}
                  fetch-depth: 0
                  fetch-tags: true

            - name: Get PR details
              id: pr-details
              run: |
                  echo "Fetching PR details for PR #${{ env.PR_NUMBER }}"
                  gh pr view ${{ env.PR_NUMBER }} --json headRefName,title,body,url --jq '{headRefName: .headRefName, title: .title, body: .body, html_url: .url}' > pr_data.json
                  echo "PR Data: $(cat pr_data.json)"
                  {
                    echo "data<<EOF"
                    cat pr_data.json
                    echo "EOF"
                  } >> $GITHUB_OUTPUT
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Configure git and push to target
              env:
                  BRANCH_NAME: ${{ fromJSON(steps.pr-details.outputs.data).headRefName }}
              run: |
                  echo "Configuring git..."
                  git config user.email "actions@github.com"
                  git config user.name "Actions Auto Build"
                  header="$(echo -n x-access-token:${{ secrets.GH_COPILOT_ECLIPSE_ORIGIN }} | base64 | tr -d '\n')"
                  git config --local http.https://github.com/.extraheader "Authorization: basic $header"

                  echo "Adding target remote..."
                  git remote add target 'https://github.com/${{ env.TARGET_REPO }}.git'

                  echo "Getting branch name from PR details..."
                  echo "Branch name: $BRANCH_NAME"

                  echo "Pushing to target repository..."
                  git push target "HEAD:$BRANCH_NAME"
                  echo "Push completed"

            - name: Check and create PR if needed
              id: pr-creation
              if: success()
              env:
                  GH_TOKEN: ${{ secrets.GH_COPILOT_ECLIPSE_ORIGIN }}
                  BRANCH_NAME: ${{ fromJSON(steps.pr-details.outputs.data).headRefName }}
                  PR_TITLE: ${{ fromJSON(steps.pr-details.outputs.data).title }}
                  PR_BODY_RAW: ${{ fromJSON(steps.pr-details.outputs.data).body }}
              run: |
                  echo "Processing PR data..."
                  echo "Branch name: $BRANCH_NAME"
                  echo "PR title: $PR_TITLE"

                  echo "Checking for existing PR..."
                  EXISTING_PR=$(gh api repos/${{ env.TARGET_REPO }}/pulls --jq ".[] | select(.head.ref == \"$BRANCH_NAME\") | .number")
                  echo "Existing PR number: $EXISTING_PR"

                  if [ -z "$EXISTING_PR" ]; then
                    echo "No existing PR found. Creating new PR..."
                    echo "Preparing PR body..."
                    
                    # Create PR body with proper escaping
                    PR_BODY="Synced from original PR: ${{ github.event.pull_request.html_url || format('https://github.com/{0}/pull/{1}', github.repository, env.PR_NUMBER) }}

                    Original Description:
                    -------------------
                    $PR_BODY_RAW"
                    
                    # Create PR and capture URL
                    PR_URL=$(gh pr create --repo ${{ env.TARGET_REPO }} \
                      --title "$PR_TITLE" \
                      --body "$PR_BODY" \
                      --head "$BRANCH_NAME" \
                      --base ${{ env.TARGET_BRANCH }})
                    echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
                    echo "New PR created at $PR_URL"
                  else
                    echo "PR #$EXISTING_PR already exists."
                  fi

            - name: Comment sync status
              if: success() && steps.pr-creation.outputs.pr_url != ''
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  PR_URL: ${{ steps.pr-creation.outputs.pr_url }}
              run: |
                  echo "Adding comment to original PR #${{ env.PR_NUMBER }}"
                  gh pr comment ${{ env.PR_NUMBER }} --body "✅ PR and commits synced to target repository: $PR_URL"
                  echo "Comment added"
